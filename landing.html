<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retake! — Coming Soon</title>
  <style>
    @font-face {
      font-family: 'Bedstead';
      src: url('bedstead-semicondensed.otf') format('opentype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Lock to viewport — no scroll ever */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1a1a2e;
      padding: clamp(10px, 1.8vw, 20px);
      display: flex;
      align-items: stretch;
      justify-content: center;
      cursor: none;
    }

    /* ── Checkerboard canvas — lives BEHIND card content ── */
    #trail-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* All card content must sit above the canvas */
    .logo, .headline, .bottom {
      position: relative;
      z-index: 1;
    }

    /* ── Custom cursor — yellow hand image (pointer devices only) ── */
    #cursor {
      position: fixed;
      width: clamp(100px, 11vw, 158px);
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -9%) rotate(-15deg);
      transform-origin: center top;
    }
    #cursor img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    /* ── Card — nature gradient: sky → grass ── */
    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg,
        #c2dcee 0%,
        #d4e8f2 18%,
        #d0e8c4 44%,
        #96ca76 63%,
        #68a84c 80%,
        #fdfcea 100%
      );
      border-radius: clamp(14px, 2.5vw, 56px);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(16px, 4vh, 52px) clamp(20px, 5vw, 100px);
    }

    /* ── Logo ── */
    .logo {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .logo img {
      height: clamp(18px, 3.8vh, 54px);
      width: auto;
      display: block;
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.55));
    }

    /* ── Headline — TV + tagline sticker stacked vertically ── */
    .headline {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: clamp(4px, 1vh, 14px) 0;
      gap: clamp(4px, 1vh, 12px);
    }
    /* TV SVG illustration */
    .tv-svg {
      height: min(300px, 42vh);
      width: auto;
      max-width: 92%;
      display: block;
      flex-shrink: 0;
      filter: drop-shadow(6px 8px 0px rgba(0,0,0,0.28));
    }
    /* Tagline sticker image below TV */
    .headline img {
      max-width: min(78%, 460px);
      max-height: min(110px, 16vh);
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
      filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.55));
    }

    /* ── Bottom section — frosted cream glass over grass ── */
    .bottom {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, 1.4vh, 18px);
      width: 100%;
      background: rgba(253, 252, 234, 0.84);
      border-radius: clamp(12px, 2vw, 22px);
      padding: clamp(14px, 2.2vh, 28px) clamp(16px, 2.5vw, 28px);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .sub {
      font-family: 'Bedstead', monospace;
      font-size: clamp(11px, 1.4vw + 4px, 20px);
      color: #1a1a2e;
      text-align: center;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    /* Pill form */
    .form-pill {
      background: #1a1a2e;
      border-radius: 100px;
      padding: clamp(5px, 0.6vw, 8px);
      display: flex;
      gap: clamp(5px, 0.6vw, 8px);
      align-items: center;
      width: 100%;
      max-width: 620px;
    }
    .form-pill input {
      flex: 1;
      background: #e4e4e4;
      border: none;
      outline: none;
      border-radius: 100px;
      padding: clamp(14px, 2.2vh, 26px) clamp(16px, 2vw, 28px);
      font-family: 'Bedstead', monospace;
      font-size: clamp(13px, 1.4vw + 4px, 20px);
      color: #545257;
      min-width: 0;
      cursor: none;
    }
    .form-pill input::placeholder { color: #aaa; }
    .form-pill button {
      flex-shrink: 0;
      background: #f1e84a;
      border: none;
      border-radius: 100px;
      padding: clamp(14px, 2.2vh, 26px) clamp(18px, 2.5vw, 36px);
      font-family: 'Bedstead', monospace;
      font-size: clamp(13px, 1.4vw + 4px, 20px);
      color: #1a1a2e;
      cursor: none;
      white-space: nowrap;
      transition: background 0.25s ease, color 0.25s ease, opacity 0.15s;
    }
    .form-pill button:hover { background: #D72638; color: #fff; opacity: 1; }
    .form-pill button.joined {
      background: #D72638;
      color: #fff;
      opacity: 1;
    }
    .form-pill button.joined:hover { opacity: 0.85; }

    /* ── Success state ── */
    .success-block {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 620px;
    }
    .success-block.visible {
      display: flex;
      animation: successIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes successIn {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }
    .success-pill {
      background: #1a1a2e;
      border-radius: 100px;
      padding: clamp(16px, 2.5vh, 26px) clamp(20px, 4vw, 48px);
      width: 100%;
      text-align: center;
    }
    .success-pill-title {
      font-family: 'Bedstead', monospace;
      font-size: clamp(15px, 2.2vh, 28px);
      color: #f1e84a;
      letter-spacing: 0.06em;
    }
    .success-pill-sub {
      font-family: 'Bedstead', monospace;
      font-size: clamp(11px, 1.5vh, 17px);
      color: rgba(253, 252, 234, 0.6);
      letter-spacing: 0.04em;
      margin-top: 6px;
    }
    /* Fade helpers */
    .fade-out {
      animation: fadeOut 0.3s ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; pointer-events: none; }
    }

    /* Social links */
    .socials {
      display: flex;
      gap: clamp(16px, 3vw, 24px);
      align-items: center;
      justify-content: center;
    }
    .socials a {
      font-family: 'Bedstead', monospace;
      font-size: clamp(13px, 1.4vw + 4px, 20px);
      color: #1a1a2e;
      text-decoration: underline;
      text-underline-offset: 3px;
      letter-spacing: 0.04em;
      cursor: none;
      transition: opacity 0.15s;
    }
    .socials a:hover { opacity: 0.45; }

    /* ── Touch / no-pointer devices: restore native cursor ── */
    @media (hover: none) {
      body { cursor: auto; }
      #cursor { display: none; }
      .form-pill input,
      .form-pill button,
      .socials a { cursor: auto; }
    }

    /* ── Very small screens (< 400px width) ── */
    @media (max-width: 400px) {
      .headline img {
        max-width: 95%;
        transform: none; /* remove the 5% lateral shift */
      }
      .sub { font-size: 11px; }
    }

    /* ── Short landscape screens (phones rotated) ── */
    @media (max-height: 480px) {
      html, body { overflow: auto; }
      .card { height: auto; min-height: calc(100vh - clamp(10px, 1.8vw, 20px) * 2); }
      .headline img { max-height: 28vh; }
    }

  </style>
</head>
<body>

<!-- Custom cursor — yellow hand (fixed, on top of everything) -->
<div id="cursor">
  <img src="https://www.figma.com/api/mcp/asset/6db76b10-d740-4d1a-a35f-4f646ed363fa" alt="" draggable="false" />
</div>

<!-- Card: dark border + cream interior -->
<div class="card">

  <!-- Canvas lives BEHIND card content, paints the #FDFCEA area only -->
  <canvas id="trail-canvas"></canvas>


  <!-- Logo image from Figma -->
  <div class="logo">
    <img
      src="https://www.figma.com/api/mcp/asset/b08e3d86-1247-4432-b75f-aab117a6c2d3"
      alt="Retake!"
    />
  </div>

  <!-- Headline: TV with hand + tagline sticker -->
  <div class="headline">

    <!-- TV illustration (hand holding a vintage TV, nature scene on screen) -->
    <svg class="tv-svg" viewBox="0 0 320 370" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <!-- Screen content: sky fading into grass -->
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#4e8fc0"/>
          <stop offset="48%"  stop-color="#a8cce0"/>
          <stop offset="50%"  stop-color="#88c068"/>
          <stop offset="100%" stop-color="#4a8030"/>
        </linearGradient>
        <!-- Clip screen content to screen bounds -->
        <clipPath id="screenClip">
          <rect x="49" y="180" width="186" height="142" rx="9"/>
        </clipPath>
      </defs>

      <!-- Antennas (behind arm and TV) -->
      <line x1="148" y1="153" x2="112" y2="68" stroke="#1a1a2e" stroke-width="7" stroke-linecap="round"/>
      <line x1="172" y1="153" x2="208" y2="68" stroke="#1a1a2e" stroke-width="7" stroke-linecap="round"/>
      <circle cx="111" cy="67" r="7" fill="#1a1a2e"/>
      <circle cx="209" cy="67" r="7" fill="#1a1a2e"/>

      <!-- Arm sleeve (silhouette, drawn before TV so it sits behind) -->
      <rect x="133" y="-20" width="54" height="178" rx="22" fill="#1a1a2e"/>
      <!-- Wrist / palm -->
      <ellipse cx="160" cy="144" rx="47" ry="26" fill="#1a1a2e"/>

      <!-- TV body -->
      <rect x="16" y="153" width="288" height="192" rx="26" fill="#1a1a2e"/>

      <!-- Screen bezel -->
      <rect x="42" y="174" width="200" height="156" rx="13" fill="#080c18"/>

      <!-- Screen content (clipped to screen bounds) -->
      <g clip-path="url(#screenClip)">
        <!-- Sky → grass gradient -->
        <rect x="49" y="180" width="186" height="142" fill="url(#skyGrad)"/>
        <!-- Cloud 1 -->
        <ellipse cx="98"  cy="210" rx="22" ry="12" fill="rgba(255,255,255,0.90)"/>
        <ellipse cx="114" cy="205" rx="18" ry="14" fill="rgba(255,255,255,0.95)"/>
        <ellipse cx="83"  cy="208" rx="15" ry="10" fill="rgba(255,255,255,0.85)"/>
        <!-- Cloud 2 -->
        <ellipse cx="175" cy="200" rx="18" ry="10" fill="rgba(255,255,255,0.80)"/>
        <ellipse cx="188" cy="196" rx="14" ry="12" fill="rgba(255,255,255,0.85)"/>
        <!-- Tree trunk -->
        <rect x="146" y="272" width="8" height="50" rx="3" fill="#2a5020"/>
        <!-- Tree canopy (layered for depth) -->
        <ellipse cx="150" cy="270" rx="22" ry="20" fill="#3a7030"/>
        <ellipse cx="150" cy="258" rx="18" ry="17" fill="#4a8838"/>
        <ellipse cx="150" cy="248" rx="13" ry="13" fill="#5a9840"/>
        <!-- Screen shine highlight -->
        <rect x="52" y="183" width="58" height="34" rx="7" fill="rgba(255,255,255,0.07)"/>
      </g>

      <!-- Knobs (right side panel) -->
      <circle cx="274" cy="214" r="14" fill="#f1e84a" stroke="#0f1020" stroke-width="2"/>
      <circle cx="274" cy="253" r="14" fill="#f1e84a" stroke="#0f1020" stroke-width="2"/>
      <circle cx="274" cy="288" r="8"  fill="rgba(241,232,74,0.35)" stroke="#0f1020" stroke-width="1.5"/>
      <!-- Speaker dots -->
      <circle cx="274" cy="312" r="3" fill="rgba(255,255,255,0.18)"/>
      <circle cx="274" cy="323" r="3" fill="rgba(255,255,255,0.18)"/>
      <circle cx="274" cy="334" r="3" fill="rgba(255,255,255,0.18)"/>

      <!-- TV feet / stand -->
      <rect x="68"  y="342" width="52" height="22" rx="8" fill="#111226"/>
      <rect x="200" y="342" width="52" height="22" rx="8" fill="#111226"/>

      <!-- Fingers overlapping TV top (drawn after TV body → appear in front) -->
      <rect x="127" y="145" width="17" height="28" rx="9" fill="#1a1a2e"/>
      <rect x="148" y="139" width="17" height="28" rx="9" fill="#1a1a2e"/>
      <rect x="170" y="139" width="17" height="28" rx="9" fill="#1a1a2e"/>
      <rect x="192" y="145" width="17" height="28" rx="9" fill="#1a1a2e"/>
    </svg>

    <!-- Tagline sticker below the TV -->
    <img
      src="https://www.figma.com/api/mcp/asset/3418cf28-fae0-413e-a422-98537e8d6e37"
      alt="Take photos inside each other's frames"
    />
  </div>

  <!-- CTA section -->
  <div class="bottom">
    <p class="sub" id="sub-text">LEAVE YOUR EMAIL — WE'LL SEND A NOTE THE MOMENT WE LAUNCH</p>

    <div class="form-pill" id="form-wrap">
      <input type="email" id="email-input" placeholder="Email" />
      <button id="join-btn">Join</button>
    </div>

    <div class="success-block" id="success-block">
      <div class="success-pill">
        <div class="success-pill-title">✦ YOU'RE ON THE LIST ✦</div>
        <div class="success-pill-sub">WE'LL SEND A NOTE THE MOMENT WE LAUNCH</div>
      </div>
    </div>

    <div class="socials">
      <a href="https://tiktok.com/@retake.app" target="_blank">Tiktok</a>
      <a href="https://instagram.com" target="_blank">Instagram</a>
    </div>
  </div>

</div>

<script>
(function () {
  /* ── Custom cursor ── */
  var cursorEl = document.getElementById('cursor');
  var mouseX = -999, mouseY = -999;

  document.addEventListener('mousemove', function (e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursorEl.style.left = mouseX + 'px';
    cursorEl.style.top  = mouseY + 'px';
  });

  /* ── Checkerboard canvas (behind all card content) ── */
  var canvas  = document.getElementById('trail-canvas');
  var ctx     = canvas.getContext('2d');
  var cardEl  = document.querySelector('.card');

  function resize() {
    var r = cardEl.getBoundingClientRect();
    canvas.width  = Math.round(r.width);
    canvas.height = Math.round(r.height);
    pat = null;
  }
  window.addEventListener('resize', resize);
  resize();

  /* Build checkerboard tile */
  var SQ = 18;
  var tile = document.createElement('canvas');
  tile.width = tile.height = SQ * 2;
  var tc = tile.getContext('2d');
  tc.fillStyle = 'rgba(255,255,255,0.28)';
  tc.fillRect(0, 0, SQ * 2, SQ * 2);
  tc.fillStyle = 'rgba(255,255,255,0.10)';
  tc.fillRect(0,  0,  SQ, SQ);
  tc.fillRect(SQ, SQ, SQ, SQ);

  var pat = null;
  function getPat() {
    if (!pat) pat = ctx.createPattern(tile, 'repeat');
    return pat;
  }

  var RADIUS = 48;
  var STEP   = 6; /* px between interpolated circles — keeps line solid */

  /* Last position the draw loop actually painted at */
  var lastDrawX = -9999, lastDrawY = -9999;

  /* Convert page coords → card-local coords */
  function toLocal(px, py) {
    var r = cardEl.getBoundingClientRect();
    return { x: px - r.left, y: py - r.top };
  }

  function inBounds(lx, ly) {
    return lx >= 0 && lx <= canvas.width && ly >= 0 && ly <= canvas.height;
  }

  function draw() {
    /* Fade existing paint back toward transparent */
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.012)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'source-over';

    var cur  = toLocal(mouseX, mouseY);
    var prev = toLocal(lastDrawX, lastDrawY);

    if (inBounds(cur.x, cur.y)) {
      ctx.fillStyle = getPat();

      if (inBounds(prev.x, prev.y)) {
        /* Interpolate between last paint position and current cursor */
        var dx   = cur.x - prev.x;
        var dy   = cur.y - prev.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var n    = Math.max(1, Math.ceil(dist / STEP));
        for (var i = 1; i <= n; i++) {
          var t = i / n;
          ctx.globalAlpha = 0.9;
          ctx.beginPath();
          ctx.arc(prev.x + dx * t, prev.y + dy * t, RADIUS, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        /* First frame in card — just paint current position */
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(cur.x, cur.y, RADIUS, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    lastDrawX = mouseX;
    lastDrawY = mouseY;
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  draw();

  /* ── Success transition ── */
  function showSuccess() {
    var subText  = document.getElementById('sub-text');
    var formWrap = document.getElementById('form-wrap');
    var block    = document.getElementById('success-block');

    /* Fade out sub text + form together */
    subText.classList.add('fade-out');
    formWrap.classList.add('fade-out');

    setTimeout(function () {
      subText.style.display  = 'none';
      formWrap.style.display = 'none';
      block.classList.add('visible');

      /* Extra flash to celebrate */
      triggerFlash();
    }, 300);
  }

  /* ── Form ── */
  document.getElementById('join-btn').addEventListener('click', function () {
    var email = document.getElementById('email-input').value.trim();
    if (!email || email.indexOf('@') === -1) {
      document.getElementById('email-input').focus();
      return;
    }
    var btn = document.getElementById('join-btn');
    btn.textContent = '...';
    btn.disabled = true;

    fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(function (r) { return r.json(); })
    .then(function () { showSuccess(); })
    .catch(function ()  { showSuccess(); }); /* still confirm visually */
  });

  document.getElementById('email-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('join-btn').click();
  });

  /* ── Camera throw on click ── */
  var CAMERA_SRC  = 'https://www.figma.com/api/mcp/asset/458f25fa-61f5-4143-a1ca-a6a7e527ec8b';
  var CAMERA_W    = 280;  /* px — big and easy to see             */
  var THROW_MS    = 1600; /* slow enough to read clearly          */
  var throwCount  = 0;

  /* ── Flash overlay ── */
  var flashEl = document.createElement('div');
  flashEl.style.cssText =
    'position:fixed;inset:0;background:#fffef0;' +
    'pointer-events:none;z-index:9999;opacity:0;';
  document.body.appendChild(flashEl);

  function triggerFlash() {
    flashEl.style.transition = 'opacity 0.08s ease-in';
    flashEl.style.opacity    = '0.45';
    setTimeout(function () {
      flashEl.style.transition = 'opacity 0.6s ease-out';
      flashEl.style.opacity    = '0';
    }, 80);
  }

  document.addEventListener('click', function (e) {
    triggerFlash();

    var side = (throwCount % 2 === 0) ? -1 : 1; /* -1 = left, 1 = right */
    throwCount++;
    throwCamera(e.clientX, e.clientY, side);
  });

  function throwCamera(cx, cy, side) {
    var rect = cardEl.getBoundingClientRect();

    /* Land close to the cursor — only drift ~200px to the side */
    var endX = cx + side * 200;
    var endY = rect.bottom - CAMERA_W * 0.5;

    var deltaX = endX - cx;
    var deltaY = endY - cy;

    /* Narrow arc — just 80px above the straight line */
    var arcHeight = -80;

    /* Gentle tilt: 15 deg in throw direction */
    var tilt = side * 15;

    var el = document.createElement('div');
    el.style.cssText =
      'position:fixed;' +
      'left:' + cx + 'px;' +
      'top:'  + cy + 'px;' +
      'width:' + CAMERA_W + 'px;' +
      'transform:translate(-50%,-50%);' +
      'pointer-events:none;' +
      'z-index:800;';

    var img = document.createElement('img');
    img.src = CAMERA_SRC;
    img.style.cssText = 'width:100%;height:auto;display:block;pointer-events:none;';
    el.appendChild(img);
    document.body.appendChild(el);

    var t0 = null;

    function step(ts) {
      if (!t0) t0 = ts;
      var t = Math.min((ts - t0) / THROW_MS, 1);

      /* X — linear */
      var x = cx + deltaX * t;

      /* Y — clean parabola: arc up then gravity down */
      var y = cy + deltaY * t + arcHeight * 4 * t * (1 - t);

      /* Tilt stays fixed — icon reads clearly the whole flight */
      img.style.transform = 'rotate(' + tilt + 'deg)';

      el.style.left = x + 'px';
      el.style.top  = y + 'px';

      if (t < 1) {
        requestAnimationFrame(step);
      }
      /* stays on the ground — never removed */
    }

    requestAnimationFrame(step);
  }
})();
</script>

</body>
</html>
