<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retake! — Coming Soon</title>
  <style>
    @font-face {
      font-family: 'Bedstead';
      src: url('bedstead-semicondensed.otf') format('opentype');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #08120c;
      padding: clamp(12px, 2vw, 40px);
      display: flex;
      align-items: stretch;
      justify-content: center;
      cursor: none;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed;
      width: clamp(100px, 11vw, 158px);
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -9%) rotate(-15deg);
      transform-origin: center top;
    }
    #cursor img { width: 100%; height: auto; display: block; pointer-events: none; }

    /* ─────────────────────────────────────────
       CARD
    ───────────────────────────────────────── */
    .card {
      position: relative;
      background: #000;
      border-radius: clamp(16px, 4vw, 100px);
      overflow: hidden;
      flex: 1;
    }

    /* ── Layer 0 — wide landscape background ── */
    .bg-landscape {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 130%;   /* wider than card, mirrors Figma's 3695/2832 ≈ 130% */
      height: 100%;
      z-index: 0;
    }
    .bg-landscape img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* ── Layer 1 — checkerboard trail canvas ── */
    #trail-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Layer 2 — hand holding phone ── */
    .bg-phone {
      position: absolute;
      top: -30%;   /* arm top bleeds off card */
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .bg-phone img {
      /* Pixel scan: phone bezel at x:53-75%, y:8-66% of natural image.     */
      /* rotate(180°) → phone visual at x:25-47%, y:34-92% (center 36%,63%)*/
      /* width:540% of card → H≈1617px; arm top/sides bleed off all edges.  */
      /* left:-142% → phone x-center (36% of img) at ~50% of card.         */
      /* top:-30% container → phone y-center (63% of img) at ~50% of card. */
      position: absolute;
      top: 0;
      left: -142%;
      width: 540%;
      height: auto;
      max-width: none;
      transform: rotate(180deg);
    }

    /* ── Layer 4 — content overlay (logo + CTA) ── */
    .content-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(18px, 4vw, 80px);
    }

    /* Logo */
    .logo {
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .logo img {
      height: clamp(22px, 5.5vh, 70px);
      width: auto;
      display: block;
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.6));
    }

    /* CTA bottom block */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.8vh, 28px);
      width: 100%;
    }

    .sub {
      font-family: 'Bedstead', monospace;
      font-size: clamp(11px, 1.4vw + 4px, 28px);
      color: #fff;
      text-align: center;
      letter-spacing: 0.04em;
      line-height: 1.35;
    }

    /* Pill form — uses #08120c matching Figma */
    .form-pill {
      background: #08120c;
      border-radius: 100px;
      padding: clamp(5px, 0.6vw, 8px);
      display: flex;
      gap: clamp(5px, 0.6vw, 8px);
      align-items: center;
      width: 100%;
      max-width: 620px;
    }
    .form-pill input {
      flex: 1;
      background: #e4e4e4;
      border: none;
      outline: none;
      border-radius: 100px;
      padding: clamp(14px, 2.2vh, 26px) clamp(16px, 2vw, 28px);
      font-family: 'Bedstead', monospace;
      font-size: clamp(13px, 1.4vw + 4px, 20px);
      color: #545257;
      min-width: 0;
      cursor: none;
    }
    .form-pill input::placeholder { color: #aaa; }
    .form-pill button {
      flex-shrink: 0;
      background: #f1e84a;
      border: none;
      border-radius: 100px;
      padding: clamp(14px, 2.2vh, 26px) clamp(18px, 2.5vw, 36px);
      font-family: 'Bedstead', monospace;
      font-size: clamp(13px, 1.4vw + 4px, 20px);
      color: #1a1a2e;
      cursor: none;
      white-space: nowrap;
      transition: background 0.25s ease, color 0.25s ease, opacity 0.15s;
    }
    .form-pill button:hover { background: #D72638; color: #fff; opacity: 1; }
    .form-pill button.joined { background: #D72638; color: #fff; opacity: 1; }
    .form-pill button.joined:hover { opacity: 0.85; }

    /* Success state */
    .success-block {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 620px;
    }
    .success-block.visible {
      display: flex;
      animation: successIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes successIn {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .success-pill {
      background: #08120c;
      border-radius: 100px;
      padding: clamp(16px, 2.5vh, 26px) clamp(20px, 4vw, 48px);
      width: 100%;
      text-align: center;
    }
    .success-pill-title {
      font-family: 'Bedstead', monospace;
      font-size: clamp(15px, 2.2vh, 28px);
      color: #f1e84a;
      letter-spacing: 0.06em;
    }
    .success-pill-sub {
      font-family: 'Bedstead', monospace;
      font-size: clamp(11px, 1.5vh, 17px);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.04em;
      margin-top: 6px;
    }
    .fade-out { animation: fadeOut 0.3s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

    /* Socials */
    .socials {
      display: flex;
      gap: clamp(16px, 3vw, 36px);
      align-items: center;
      justify-content: center;
    }
    .socials a {
      font-family: 'Bedstead', monospace;
      font-size: clamp(13px, 1.4vw + 4px, 20px);
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
      letter-spacing: 0.04em;
      cursor: none;
      transition: opacity 0.15s;
    }
    .socials a:hover { opacity: 0.55; }

    /* ── Touch devices: restore native cursor ── */
    @media (hover: none) {
      body { cursor: auto; }
      #cursor { display: none; }
      .form-pill input, .form-pill button, .socials a { cursor: auto; }
    }

    /* ── Very small screens ── */
    @media (max-width: 400px) {
      .sub { font-size: 11px; }
    }

    /* ── Landscape mobile ── */
    @media (max-height: 480px) {
      html, body { overflow: auto; }
      .card { height: auto; min-height: calc(100vh - clamp(12px, 2vw, 40px) * 2); }
    }

  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor">
  <img src="cursor-hand.png" alt="" draggable="false" />
</div>

<div class="card">

  <!-- Layer 0: wide landscape background -->
  <div class="bg-landscape">
    <img src="bg-landscape.jpg" alt="" draggable="false" />
  </div>

  <!-- Layer 1: trail canvas (between background and phone) -->
  <canvas id="trail-canvas"></canvas>

  <!-- Layer 2: hand holding phone, rotated 180° -->
  <div class="bg-phone">
    <img src="hand-phone.png" alt="" draggable="false" />
  </div>

  <!-- Layer 4: content — logo at top, CTA at bottom -->
  <div class="content-wrap">

    <div class="logo">
      <img
        src="retake-logo.png"
        alt="Retake!"
      />
    </div>

    <div class="bottom">
      <p class="sub" id="sub-text">LEAVE YOUR EMAIL<br>WE'LL SEND A NOTE THE MOMENT WE LAUNCH</p>

      <div class="form-pill" id="form-wrap">
        <input type="email" id="email-input" placeholder="Email" />
        <button id="join-btn">Join</button>
      </div>

      <div class="success-block" id="success-block">
        <div class="success-pill">
          <div class="success-pill-title">✦ YOU'RE ON THE LIST ✦</div>
          <div class="success-pill-sub">WE'LL SEND A NOTE THE MOMENT WE LAUNCH</div>
        </div>
      </div>

      <div class="socials">
        <a href="https://tiktok.com/@retake.app" target="_blank">Tiktok</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
      </div>
    </div>

  </div>

</div>

<script>
(function () {

  /* ── Custom cursor ── */
  var cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', function (e) {
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top  = e.clientY + 'px';
  });

  /* ── Trail canvas ── */
  var canvas = document.getElementById('trail-canvas');
  var ctx    = canvas.getContext('2d');
  var cardEl = document.querySelector('.card');

  function resize() {
    var r = cardEl.getBoundingClientRect();
    canvas.width  = Math.round(r.width);
    canvas.height = Math.round(r.height);
    pat = null;
  }
  window.addEventListener('resize', resize);
  resize();

  /* Checkerboard tile */
  var SQ   = 20;
  var tile = document.createElement('canvas');
  tile.width = tile.height = SQ * 2;
  var tc = tile.getContext('2d');
  tc.clearRect(0, 0, SQ * 2, SQ * 2);
  tc.fillStyle = 'rgba(255,255,255,0.82)';
  tc.fillRect(0,  0,  SQ, SQ);
  tc.fillRect(SQ, SQ, SQ, SQ);
  var pat = null;
  function getPat() { if (!pat) pat = ctx.createPattern(tile, 'repeat'); return pat; }

  var TRAIL_MS = 1200;
  var RADIUS   = 52;
  var ISTEP    = 4;
  var trail    = [];

  function toLocal(px, py) {
    var r = cardEl.getBoundingClientRect();
    return { x: px - r.left, y: py - r.top };
  }
  function inBounds(lx, ly) {
    return lx >= 0 && lx <= canvas.width && ly >= 0 && ly <= canvas.height;
  }

  /* Record on every mousemove — never misses fast swipes */
  document.addEventListener('mousemove', function (e) {
    var cur = toLocal(e.clientX, e.clientY);
    if (inBounds(cur.x, cur.y)) trail.push({ x: cur.x, y: cur.y, t: performance.now() });
  });

  function draw(now) {
    /* Wipe completely — zero residue */
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    while (trail.length && (now - trail[0].t) >= TRAIL_MS) trail.shift();
    if (trail.length < 2) { requestAnimationFrame(draw); return; }

    ctx.fillStyle = getPat();

    for (var i = 1; i < trail.length; i++) {
      var p0    = trail[i - 1];
      var p1    = trail[i];
      var age   = (now - p0.t) / TRAIL_MS;
      var alpha = (1 - age) * 0.88;
      if (alpha <= 0) continue;
      ctx.globalAlpha = alpha;

      var dx   = p1.x - p0.x;
      var dy   = p1.y - p0.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var n    = Math.max(1, Math.ceil(dist / ISTEP));
      for (var j = 0; j <= n; j++) {
        var t = j / n;
        ctx.beginPath();
        ctx.arc(p0.x + dx * t, p0.y + dy * t, RADIUS, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  /* ── Flash overlay ── */
  var flashEl = document.createElement('div');
  flashEl.style.cssText = 'position:fixed;inset:0;background:#fffef0;pointer-events:none;z-index:9999;opacity:0;';
  document.body.appendChild(flashEl);

  function triggerFlash() {
    flashEl.style.transition = 'opacity 0.08s ease-in';
    flashEl.style.opacity    = '0.45';
    setTimeout(function () {
      flashEl.style.transition = 'opacity 0.6s ease-out';
      flashEl.style.opacity    = '0';
    }, 80);
  }

  /* ── Success transition ── */
  function showSuccess() {
    var subText  = document.getElementById('sub-text');
    var formWrap = document.getElementById('form-wrap');
    var block    = document.getElementById('success-block');
    subText.classList.add('fade-out');
    formWrap.classList.add('fade-out');
    setTimeout(function () {
      subText.style.display  = 'none';
      formWrap.style.display = 'none';
      block.classList.add('visible');
      triggerFlash();
    }, 300);
  }

  /* ── Email form ── */
  document.getElementById('join-btn').addEventListener('click', function () {
    var email = document.getElementById('email-input').value.trim();
    if (!email || email.indexOf('@') === -1) { document.getElementById('email-input').focus(); return; }
    var btn = document.getElementById('join-btn');
    btn.textContent = '...';
    btn.disabled = true;
    fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(function (r) { return r.json(); })
    .then(function () { showSuccess(); })
    .catch(function () { showSuccess(); });
  });

  document.getElementById('email-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('join-btn').click();
  });

  /* ── Drop on click — alternates camera / sticker each click ── */
  /* halfH = half of rendered height at given w (based on natural aspect ratio) */
  var ITEMS = [
    { src: 'camera-throw.png',   w: 280, halfH: 233 }, /* 759×1265 → h≈467 */
    { src: 'sticker-frames.svg', w: 320, halfH: 122 }, /* 696×532  → h≈244 */
    { src: 'sticker-ball.png',   w: 200, halfH: 166 }  /* 760×1264 → h≈332 */
  ];
  var THROW_MS   = 1600;
  var throwCount = 0;

  document.addEventListener('click', function (e) {
    triggerFlash();
    var item = ITEMS[throwCount % ITEMS.length];
    var side = (throwCount % 2 === 0) ? -1 : 1;
    throwCount++;
    throwItem(e.clientX, e.clientY, side, item);
  });

  function throwItem(cx, cy, side, item) {
    var rect      = cardEl.getBoundingClientRect();
    var bottomEl  = document.querySelector('.bottom');
    var bottomTop = bottomEl ? (bottomEl.getBoundingClientRect().top - rect.top) : rect.height;
    /* Items must land above the text/form area — cap endY with 60px clearance */
    var safeBottom = bottomTop - 60;

    /* Convert viewport click → card-relative coords */
    var lx     = cx - rect.left;
    var ly     = cy - rect.top;
    var endX   = lx + side * 200;
    /* Item center at endY; bottom edge = endY + halfH. Keep 30px clear of form. */
    var endY   = safeBottom - item.halfH - 30;
    var deltaX = endX - lx;
    var deltaY = endY - ly;
    var tilt   = side * 15;

    var el = document.createElement('div');
    /* position:absolute inside card, z-index 4 → always behind dark rim */
    el.style.cssText = 'position:absolute;left:' + lx + 'px;top:' + ly + 'px;width:' + item.w + 'px;transform:translate(-50%,-50%);pointer-events:none;z-index:4;';
    var img = document.createElement('img');
    img.src = item.src;
    img.style.cssText = 'width:100%;height:auto;display:block;pointer-events:none;';
    el.appendChild(img);
    cardEl.appendChild(el);

    var t0 = null;
    function step(ts) {
      if (!t0) t0 = ts;
      var t = Math.min((ts - t0) / THROW_MS, 1);
      el.style.left = (lx + deltaX * t) + 'px';
      el.style.top  = (ly + deltaY * t + (-80) * 4 * t * (1 - t)) + 'px';
      img.style.transform = 'rotate(' + tilt + 'deg)';
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

})();
</script>

</body>
</html>
